spring:
  application:
    name: english-app-backend
  datasource:
    url: jdbc:sqlite:english.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

voice:
  provider: baidu
  baidu:
    app-id: ${BAIDU_APP_ID:}
    api-key: ${BAIDU_API_KEY:}
    secret-key: ${BAIDU_SECRET_KEY:}

app:
  word-image:
    # 图片访问基址:开发期为后端服务地址,生产期可改为 CDN 域名
    base-url: ${WORD_IMAGE_BASE_URL:}
    # 静态资源路径前缀,对应 static 目录下的子路径
    path-prefix: /images/words
    # 图片文件扩展名(统一 jpg)
    extension: .jpg
